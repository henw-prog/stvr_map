<!DOCTYPE html>
<html>
<head>
  <title>Chatham County STVR Compliance Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.css" rel="stylesheet" />

  <style>
    body {
      background-color: #1e1e1e;
      color: white;
      margin: 0;
      font-family: Arial, sans-serif;
    }
    h2 {
      padding: 10px;
      text-align: center;
      background-color: #222;
      margin: 0;
      color: #fff;
    }
    #map {
      height: calc(100vh - 44px);
      width: 100%;
    }

    .filter-panel {
      position: absolute;
      top: 10px;
      right: 10px;
      background: white;
      color: #333;
      padding: 12px;
      border-radius: 6px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
    }

    .filter-title {
      font-weight: bold;
      margin-bottom: 6px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 4px;
    }

    .filter-item {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-weight: bold;
    }

    .filter-item input {
      margin-right: 8px;
      transform: scale(1.2);
      cursor: pointer;
    }

    .popup-title {
      font-size: 14px;
      font-weight: bold;
      color: #000;
      margin-bottom: 4px;
    }

    .popup-content {
      color: #000;
      font-size: 13px;
    }

    .warning-text {
      color: #d32f2f;
      font-weight: bold;
      background: #ffebee;
      padding: 4px 6px;
      border-radius: 4px;
      margin: 4px 0;
      display: inline-block;
    }

    .airbnb-link {
      display: block;
      margin-top: 10px;
      padding: 6px 12px;
      background-color: #ff5a5f;
      color: white !important;
      text-decoration: none !important;
      border-radius: 4px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>

  <h2>Chatham County STVR Compliance Map</h2>
  <div id="map"></div>

  <div class="filter-panel">
    <div class="filter-title">Compliance Filters</div>
    <label class="filter-item">
      <input type="checkbox" id="complianceCheckbox">
      Show Violations Only
    </label>
  </div>

  <script src="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.js"></script>
  <script src="data_files/in_process_data/locations.js"></script>

  <script>
    // Precompute metrics
    const processedLocations = locations.map(loc => {
      const latitude = Number(loc.latitude);
      const longitude = Number(loc.longitude);
      const guests = Number(loc.guests) || 0;
      const bedrooms = Number(loc.bedrooms) || 0;

      if (!latitude || !longitude) return null;

      const baselineLimit = (bedrooms * 2) + 2;
      const maxAllowedGuests = bedrooms === 0 ? 2 : baselineLimit;
      const isOverCapacity = guests > maxAllowedGuests;
      const overAmount = isOverCapacity ? guests - maxAllowedGuests : 0;

      return {
        ...loc,
        latitude,
        longitude,
        guests,
        bedrooms,
        maxAllowedGuests,
        isOverCapacity,
        overAmount: Number(overAmount)
      };
    }).filter(Boolean);

    // Convert to GeoJSON
    function toGeoJSON(data) {
      return {
        type: "FeatureCollection",
        features: data.map(loc => ({
          type: "Feature",
          geometry: {
            type: "Point",
            coordinates: [loc.longitude, loc.latitude]
          },
          properties: loc
        }))
      };
    }

    const defaultCenter = [-81.0087, 32.0485];

    const map = new maplibregl.Map({
      container: "map",
      style: {
        version: 8,
        glyphs: "https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf",
        sources: {
          "osm": {
            type: "raster",
            tiles: [
              "https://tile.openstreetmap.org/{z}/{x}/{y}.png"
            ],
            tileSize: 256
          }
        },
        layers: [
          {
            id: "osm",
            type: "raster",
            source: "osm"
          }
        ]
      },
      center: defaultCenter,
      zoom: 12
    });

    // ⭐ Custom smooth animation helper
    function animateMap(targetCenter, targetZoom, duration = 900) {
      const startZoom = map.getZoom();
      const startCenter = map.getCenter();
      const startTime = performance.now();

      function frame(now) {
        const t = Math.min((now - startTime) / duration, 1);
        const eased = t * (2 - t);

        const lng = startCenter.lng + (targetCenter[0] - startCenter.lng) * eased;
        const lat = startCenter.lat + (targetCenter[1] - startCenter.lat) * eased;
        const zoom = startZoom + (targetZoom - startZoom) * eased;

        map.jumpTo({ center: [lng, lat], zoom });

        if (t < 1) requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);
    }

    map.on("load", () => {

      // Source with clustering
      map.addSource("strv", {
        type: "geojson",
        data: toGeoJSON(processedLocations),
        cluster: true,
        clusterRadius: 40,
        clusterMaxZoom: 14
      });

      // Cluster circles
      map.addLayer({
        id: "clusters",
        type: "circle",
        source: "strv",
        filter: ["has", "point_count"],
        paint: {
          "circle-color": "#444",
          "circle-radius": [
            "step",
            ["get", "point_count"],
            18, 10,
            22, 25,
            28
          ]
        }
      });

      // Cluster count labels
      map.addLayer({
        id: "cluster-count",
        type: "symbol",
        source: "strv",
        filter: ["has", "point_count"],
        layout: {
          "text-field": "{point_count}",
          "text-size": 12,
          "text-font": ["Noto Sans Regular"]
        },
        paint: {
          "text-color": "#fff"
        }
      });

      // Individual STVR circles
      map.addLayer({
        id: "strv-circles",
        type: "circle",
        source: "strv",
        filter: ["!", ["has", "point_count"]],
        paint: {
          "circle-radius": 12,
          "circle-color": [
            "case",
            ["get", "isOverCapacity"],
            "#d32f2f",
            "#388e3c"
          ],
          "circle-stroke-width": 2,
          "circle-stroke-color": "#fff"
        }
      });

      // Labels with collision avoidance
      map.addLayer({
        id: "strv-labels",
        type: "symbol",
        source: "strv",
        filter: ["!", ["has", "point_count"]],
        layout: {
          "text-field": [
            "case",
            ["get", "isOverCapacity"],
            ["to-string", ["get", "overAmount"]],
            ""
          ],
          "text-size": 12,
          "text-font": ["Noto Sans Regular"],
          "text-anchor": "center",
          "text-justify": "center",
          "text-allow-overlap": false,
          "text-ignore-placement": false
        },
        paint: {
          "text-color": "#000",
          "text-halo-color": "#fff",
          "text-halo-width": 0.8
        }
      });

      // Popups + smooth animated zoom for individual points
      map.on("click", "strv-circles", (e) => {
        const loc = e.features[0].properties;

        const excessive = loc.guests - loc.maxAllowedGuests;
        const warning = excessive > 0
          ? `<div class="warning-text">⚠️ OVER CAPACITY BY ${excessive} GUESTS</div>`
          : "";

        const html = `
          <div class="popup-content">
            <div class="popup-title">${loc.rental_type}</div>
            <strong>Approximate Address:</strong> ${loc.approximate_address}<br/>
            <strong>Host:</strong> ${loc.host_name}<hr/>

            <strong>Advertised Capacity:</strong> ${loc.guests}<br/>
            <strong>Bedrooms:</strong> ${loc.bedrooms}<br/>
            <strong>Legal Limit:</strong> ${loc.maxAllowedGuests}<br/>
            ${warning}

            <a class="airbnb-link" href="${loc.url}" target="_blank">View Listing</a>
          </div>
        `;

        new maplibregl.Popup()
          .setLngLat(e.lngLat)
          .setHTML(html)
          .addTo(map);

        // ⭐ Smooth animation
        animateMap(
          e.features[0].geometry.coordinates,
          Math.max(map.getZoom(), 15)
        );
      });

      // ⭐ Perfect cluster zoom — smooth animation
      map.on("click", "clusters", (e) => {
        const clusterId = e.features[0].properties.cluster_id;
        const source = map.getSource("strv");

        source.getClusterLeaves(clusterId, Infinity, 0, (err, leaves) => {
          if (err || !leaves.length) return;

          let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

          leaves.forEach(f => {
            const [x, y] = f.geometry.coordinates;
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x > maxX) maxX = x;
            if (y > maxY) maxY = y;
          });

          const center = [(minX + maxX) / 2, (minY + maxY) / 2];

          // Compute zoom level based on bbox size
          const dx = maxX - minX;
          const dy = maxY - minY;
          const size = Math.max(dx, dy);
          const zoom = Math.min(18, map.getZoom() + (size < 0.01 ? 3 : 2));

          animateMap(center, zoom);
        });
      });

    });

    // Filter handler
    document.getElementById("complianceCheckbox").addEventListener("change", (e) => {
      const filtered = e.target.checked
        ? processedLocations.filter(loc => loc.isOverCapacity)
        : processedLocations;

      map.getSource("strv").setData(toGeoJSON(filtered));
    });
  </script>
</body>
</html>
